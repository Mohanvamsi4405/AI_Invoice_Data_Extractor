version: "3.9"

services:
  ai-invoice-reader:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ai-invoice-reader
    ports:
      - "8000:8000"
    environment:
      - GROQ_API_KEY=${GROQ_API_KEY}
      - ENV=${ENV:-production}
      - PORT=8000
      - EXCEL_PATH=/app/data/invoices.xlsx
    volumes:
      # Persist Excel data across container restarts
      - invoice_data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

volumes:
  invoice_data:
    driver: local
