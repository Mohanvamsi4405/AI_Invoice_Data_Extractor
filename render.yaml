# Render.com deployment configuration
# Docs: https://render.com/docs/render-yaml-spec

services:
  - type: web
    name: ai-invoice-reader
    runtime: docker
    dockerfilePath: ./Dockerfile
    envVars:
      - key: GROQ_API_KEY
        sync: false          # Set this in Render dashboard → Environment
      - key: ENV
        value: production
      - key: PORT
        value: 10000         # Render uses port 10000 internally
      - key: EXCEL_PATH
        value: /app/data/invoices.xlsx
    disk:
      name: invoice-data
      mountPath: /app/data
      sizeGB: 1
    healthCheckPath: /api/health
    autoDeploy: true
